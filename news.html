<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>النشرة البريدية | ماريلاين للأزياء</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="welcome">اشتركي بالعروض الجديدة أولًا بأول</div>

  <div class="toast" id="toast"></div>

  <header class="header">
    <div class="container header-top">
      <a class="brand" href="index.html">
        <img class="logo" src="assets/logo.jpg" alt="شعار ماريلاين للأزياء" />
        <div class="brand-text">
          <div class="brand-name">ماريلاين للأزياء</div>
          <div class="brand-sub">النشرة البريدية</div>
        </div>
      </a>

      <div class="header-actions">
        <a class="btn btn-ghost" href="index.html">العودة للمتجر</a>
      </div>
    </div>
  </header>

  <main>
    <section class="section container">
      <div class="section-head">
        <h2>اشتركي في نشرتنا البريدية</h2>
        <p class="note">يصلك الجديد والعروض مباشرة</p>
      </div>

      <form id="newsForm">
        <label for="fullName">الاسم</label>
        <input class="form-field" type="text" id="fullName" placeholder="اكتبي اسمك" required />

        <label for="email">البريد الإلكتروني</label>
        <input class="form-field" type="email" id="email" placeholder="example@mail.com" required />

        <button class="btn btn-primary" type="submit">إرسال</button>
        <p id="formMsg" class="note" style="margin-top:12px;"></p>
      </form>
    </section>

    <section class="section container">
      <div class="footer-box" style="margin:0;">
        <div>إعداد الطالبة: <strong>تالا ماجد بانافع</strong></div>
        <div>الصف: <strong>ثاني ثانوي / 1</strong></div>
        <div class="copy">© 2026 ماريلاين للأزياء</div>
      </div>
    </section>
  </main>

  <script>
    const toastEl = document.getElementById("toast");
    let toastTimer = null;

    function toast(msg){
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(()=> toastEl.classList.remove("show"), 2200);
    }

    const form = document.getElementById("newsForm");
    const msg = document.getElementById("formMsg");

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      msg.textContent = "تم استلام بياناتك بنجاح ✅";
      toast("شكرًا لاشتراكك 💖");
      form.reset();
    });
  </script>
</body>
</html>
